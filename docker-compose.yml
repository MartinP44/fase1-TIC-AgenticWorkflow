
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ctf_reviewer_backend
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=llama3.1
      - CORS_ORIGINS=http://localhost:5173,http://localhost:80
      - MAX_FILE_SIZE_MB=10
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ctf_reviewer_frontend
    ports:
      - "5173:5173"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped
